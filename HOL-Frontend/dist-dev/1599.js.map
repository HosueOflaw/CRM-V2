<div class="flex justify-center items-center min-h-screen bg-base-200 px-4">
  <div class="w-full max-w-3xl bg-base-100 p-8 rounded-2xl shadow-lg">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-primary text-center flex-1">
        نموذج بيانات الدعوى
      </h2>
      <app-go-back></app-go-back>
    </div>

    <form
      class="grid grid-cols-1 md:grid-cols-2 gap-6"
      #caseForm="ngForm"
      (ngSubmit)="save()"
    >
      <div>
        <label class="block mb-1 font-semibold">الكود</label>
        <input
          type="text"
          [(ngModel)]="caseData.code"
          name="code"
          class="input input-bordered w-full"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">اسم الموكل</label>
        <input
          type="text"
          [(ngModel)]="caseData.clientName"
          name="clientName"
          class="input input-bordered w-full"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">اسم الخصم</label>
        <input
          type="text"
          [(ngModel)]="caseData.opponentName"
          name="opponentName"
          class="input input-bordered w-full"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">موضوع الدعوى</label>
        <input
          type="text"
          [(ngModel)]="caseData.caseSubject"
          name="caseSubject"
          class="input input-bordered w-full"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">رقم الدعوى</label>
        <input
          type="text"
          [(ngModel)]="caseData.caseNumber"
          name="caseNumber"
          class="input input-bordered w-full"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">المحكمة</label>
        <select
          [(ngModel)]="caseData.court"
          name="court"
          class="select select-bordered w-full"
        >
          <option value="">اختر المحكمة</option>
          <option>محكمة الجنايات</option>
          <option>محكمة الأسرة</option>
          <option>محكمة الاستئناف</option>
        </select>
      </div>

      <div>
        <label class="block mb-1 font-semibold">نوع الحكم</label>
        <select
          [(ngModel)]="caseData.judgmentType"
          name="judgmentType"
          class="select select-bordered w-full"
        >
          <option value="">اختر نوع الحكم</option>
          <option>ابتدائي</option>
          <option>استئناف</option>
          <option>نقض</option>
        </select>
      </div>

      <div>
        <label class="block mb-1 font-semibold">تاريخ الحكم</label>
        <input
          type="date"
          [(ngModel)]="caseData.judgmentDate"
          name="judgmentDate"
          class="input input-bordered w-full"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">آخر موعد للاستئناف</label>
        <input
          type="date"
          [(ngModel)]="caseData.appealDeadline"
          name="appealDeadline"
          class="input input-bordered w-full"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">تاريخ التنبيه</label>
        <input
          type="date"
          [(ngModel)]="caseData.reminderDate"
          name="reminderDate"
          class="input input-bordered w-full"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">الرقم الآلي</label>
        <input
          type="text"
          [(ngModel)]="caseData.autoNumber"
          name="autoNumber"
          class="input input-bordered w-full"
        />
      </div>

      <div class="col-span-full flex justify-center gap-4 mt-8">
        <button type="submit" class="btn btn-success w-32">💾 حفظ</button>
        <button type="button" class="btn btn-warning w-32" (click)="edit()">
          ✏️ تعديل
        </button>
        <button type="button" class="btn btn-error w-32" (click)="delete()">
          🗑 حذف
        </button>
      </div>
    </form>
  </div>
</div>
