<div class="p-6 min-h-screen"
     style="background-color: var(--surface-ground);">
  <!-- 🔹 الفلاتر -->
  <div class="flex flex-wrap items-end gap-3 mb-6">
    <div>
      <label class="block mb-1 text-sm font-semibold" style="color: var(--text-color);">من تاريخ</label>
      <input
        type="date"
        class="input input-bordered input-sm"
        style="border-color: var(--surface-border); background-color: var(--surface-card); color: var(--text-color);"
        [(ngModel)]="startDate"
      />
    </div>

    <div>
      <label class="block mb-1 text-sm font-semibold" style="color: var(--text-color);">إلى تاريخ</label>
      <input
        type="date"
        class="input input-bordered input-sm"
        style="border-color: var(--surface-border); background-color: var(--surface-card); color: var(--text-color);"
        [(ngModel)]="endDate"
      />
    </div>

    <div>
      <label class="block mb-1 text-sm font-semibold" style="color: var(--text-color);">نوع الجلسة</label>
      <select
        class="select select-bordered select-sm w-64"
        style="border-color: var(--surface-border); background-color: var(--surface-card); color: var(--text-color);"
        [(ngModel)]="selectedSessionType"
      >
        <option value="">الكل</option>
        <option value="استلام صيغة تنفيذ">استلام صيغة تنفيذ</option>
        <option value="استلام صورة طبق الأصل">استلام صورة طبق الأصل</option>
        <option value="استلام حكم">استلام حكم</option>
        <option value="رفض الدعوى">رفض الدعوى</option>
        <option value="شطب الدعوى">شطب الدعوى</option>
        <option value="وقف الدعوى">وقف الدعوى</option>
      </select>
    </div>

    <button class="btn btn-sm btn-primary mt-6" (click)="applyFilters()">
      استعلام
    </button>
  </div>

  <!-- 🔹 الجدول -->
  <div class="overflow-x-auto rounded-xl shadow"
       style="background-color: var(--surface-card);">
    <table class="table table-sm w-full text-sm">
      <thead style="background-color: var(--surface-section); color: var(--text-color);"
             class="font-semibold">
        <tr>
          <th>رقم الجلسة</th>
          <th>التاريخ</th>
          <th>نوع الجلسة</th>
          <th>المحكمة</th>
          <th>الموكل</th>
          <th>الملاحظات</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let session of filteredSessions; let i = index"
          [style.background-color]="i % 2 === 0 ? 'var(--surface-card)' : 'var(--surface-ground)'"
          style="color: var(--text-color); transition: background-color 0.2s;"
        >
          <td>{{ session.sessionNumber }}</td>
          <td>{{ session.date | date: 'yyyy-MM-dd' }}</td>
          <td>{{ session.type }}</td>
          <td>{{ session.court }}</td>
          <td>{{ session.client }}</td>
          <td>{{ session.notes }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- 🔹 لا توجد بيانات -->
  <div *ngIf="filteredSessions.length === 0" class="text-center mt-4"
       style="color: var(--text-color-secondary);">
    لا توجد جلسات مطابقة للبحث.
  </div>
</div>
