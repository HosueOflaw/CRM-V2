<div class="p-6 min-h-screen space-y-6"
     style="background-color: var(--surface-ground);">
  <!-- 🔸 Filters -->
  <div class="p-6 rounded-xl shadow space-y-4"
       style="background-color: var(--surface-card);">
    <h2 class="text-lg font-semibold mb-2" style="color: var(--text-color);">بحث الطلبات</h2>

    <div class="flex flex-wrap gap-4">
      <div class="flex flex-col w-1/5">
        <label class="text-sm mb-1" style="color: var(--text-color);">من تاريخ</label>
        <input type="date" [(ngModel)]="fromDate"
               class="input input-bordered"
               style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="flex flex-col w-1/5">
        <label class="text-sm mb-1" style="color: var(--text-color);">إلى تاريخ</label>
        <input type="date" [(ngModel)]="toDate"
               class="input input-bordered"
               style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="flex flex-col w-1/5">
        <label class="text-sm mb-1" style="color: var(--text-color);">المحكمة</label>
        <div class="flex gap-2">
          <input
            type="text"
            readonly
            class="input input-bordered w-full"
            style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);"
            placeholder="اختر المحكمة"
            [(ngModel)]="selectedCourt"
          />
          <button class="btn btn-outline" (click)="openCourtModal()">...</button>
        </div>
      </div>

      <div class="flex items-end gap-3 w-full md:w-auto">
        <button class="btn btn-primary" (click)="searchRequests()">استعلام</button>
        <button class="btn btn-accent">طلب العهدة</button>
      </div>
    </div>
  </div>

  <!-- 🔹 Table Section -->
  <div class="p-6 rounded-xl shadow"
       style="background-color: var(--surface-card);">
    <h3 class="text-lg font-semibold mb-4" style="color: var(--text-color);">الطلبات</h3>
    <div class="overflow-x-auto">
      <table class="table table-zebra w-full text-center"
             style="border-color: var(--surface-border);">
        <thead>
          <tr style="background-color: var(--surface-section);">
            <th style="color: var(--text-color);">#</th>
            <th style="color: var(--text-color);">رقم الطلب</th>
            <th style="color: var(--text-color);">اسم المحكمة</th>
            <th style="color: var(--text-color);">تاريخ الطلب</th>
            <th style="color: var(--text-color);">الحالة</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let req of filteredRequests; let i = index"
              [style.background-color]="i % 2 === 0 ? 'var(--surface-card)' : 'var(--surface-ground)'"
              style="color: var(--text-color);">
            <td>{{ req.id }}</td>
            <td>{{ req.number }}</td>
            <td>{{ req.court }}</td>
            <td>{{ req.date }}</td>
            <td>
              <span
                [ngClass]="{
                  'badge badge-success': req.status === 'مقبول',
                  'badge badge-error': req.status === 'مرفوض',
                  'badge badge-warning': req.status === 'معلق'
                }"
              >
                {{ req.status }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 🔸 Court Modal -->
  <dialog #lookupModal class="modal">
    <div class="modal-box w-11/12 max-w-4xl"
         style="background-color: var(--surface-card);">
      <h3 class="font-bold text-lg mb-3" style="color: var(--text-color);">{{ title }}</h3>

      <input
        [(ngModel)]="search"
        (input)="filterData()"
        placeholder="ابحث..."
        class="input input-bordered w-full mb-4"
        style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);"
      />

      <div class="overflow-y-auto max-h-[400px]">
        <table class="table table-sm w-full text-sm"
               style="border-color: var(--surface-border);">
          <thead>
            <tr style="background-color: var(--surface-section);">
              <th *ngFor="let col of columns" style="color: var(--text-color);">{{ col }}</th>
              <th style="color: var(--text-color);"></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of filteredData; let i = index"
                [style.background-color]="i % 2 === 0 ? 'var(--surface-card)' : 'var(--surface-ground)'"
                style="color: var(--text-color);">
              <td *ngFor="let col of columns">{{ row[col] }}</td>
              <td>
                <button class="btn btn-xs btn-primary" (click)="selectItem(row)">
                  اختيار
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="modal-action">
        <button class="btn btn-outline" (click)="closeModal()">إغلاق</button>
      </div>
    </div>
  </dialog>
</div>
