<dialog #modal id="justicePortalModal" class="modal">
  <div class="modal-box max-w-5xl">
    <h3 class="font-bold text-xl mb-4 text-center">⚖️ نسخ من بوابة العدل</h3>

    <form [formGroup]="form" class="grid grid-cols-2 gap-6">
      <!-- Left textarea -->
         <div class="grid grid-cols-2 gap-4">
            <div>
          <label class="label font-semibold">الكود</label>
          <input type="text" formControlName="code" class="input input-bordered w-full" />
        </div>
        <div>
          <label class="label font-semibold">الموكل</label>
          <input type="text" formControlName="client" class="input input-bordered w-full" />
        </div>
        <div>
          <label class="label font-semibold">الخصم</label>
          <input type="text" formControlName="opponent" class="input input-bordered w-full" />
        </div>

        <div>
          <label class="label font-semibold">المدني</label>
          <input type="text" formControlName="civil" class="input input-bordered w-full" />
        </div>
        <div>
          <label class="label font-semibold">الرقم الآلي</label>
          <input type="text" formControlName="autoNumber" class="input input-bordered w-full" />
        </div>
      </div>
     

      <!-- Right side form fields -->
     <div>
        <label class="label font-semibold">ملاحظات عامة</label>
        <textarea formControlName="leftNotes" class="textarea textarea-bordered w-full h-full"></textarea>
      </div>
    </form>

    <!-- Buttons -->
    <div class="flex justify-center gap-4 mt-6">
      <button class="btn btn-success" (click)="submit()">📄 المستجدات</button>
      <button class="btn btn-error" (click)="close()">↩️ تراجع</button>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto mt-8">
      <table class="table table-zebra w-full text-center">
        <thead>
          <tr>
            <th>الكود</th>
            <th>مسلسل</th>
            <th>التاريخ</th>
            <th>الإجراء</th>
            <th>المبلغ</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of [1,2,3]">
            <td>J{{ row }}</td>
            <td>{{ row }}</td>
            <td>2025-11-02</td>
            <td>تحديث بيانات</td>
            <td>250</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</dialog>
