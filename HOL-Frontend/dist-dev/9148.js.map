  <h2 class="text-xl font-bold mb-6 flex items-center gap-2" style="color: var(--text-color);">
    ⚖️ منطوق الحكم
  </h2>

  <!-- 📊 جدول عرض الأحكام -->
  <div class="overflow-x-auto mt-8">
    <table class="table table-zebra w-full text-center" style="border-color: var(--surface-border);">
      <thead style="background-color: var(--surface-section);">
        <tr style="color: var(--text-color);">
          <th style="color: var(--text-color);">منطوق الحكم</th>
          <th style="color: var(--text-color);">تاريخ الحكم</th>
          <th style="color: var(--text-color);">درجة التقاضي</th>
          <th style="color: var(--text-color);">نوع الحكم</th>
          <th style="color: var(--text-color);">المحكمة</th>
          <th style="color: var(--text-color);">المرفق</th>
          <th style="color: var(--text-color);">إجراء</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of judgments; let i = index" style="color: var(--text-color);">
          <td class="max-w-xs truncate">{{ item.statement }}</td>
          <td>{{ item.date | date: 'dd/MM/yyyy' }}</td>
          <td>{{ item.level }}</td>
          <td>{{ item.type }}</td>
          <td>{{ item.court }}</td>
          <td>
            <a
              *ngIf="item.attachment"
              [href]="item.attachment"
              target="_blank"
              style="color: var(--primary-color, #3b82f6);"
              class="hover:underline"
              >📎 عرض</a
            >
          </td>
          <td>
            <button class="btn btn-sm btn-error" (click)="deleteJudgment(i)">
              🗑️ حذف
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
