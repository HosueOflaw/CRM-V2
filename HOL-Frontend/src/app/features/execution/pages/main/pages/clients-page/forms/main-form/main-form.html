<div class="card" style="background-color: var(--surface-card);">
  <h2 class="text-lg font-semibold mb-3" style="color: var(--text-color);">البيانات الرئيسية</h2>

  <div class="grid grid-cols-2 gap-6">
    <!-- الفورم الأول -->
    <form class="space-y-4">
      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">القطاع</label>
        <input type="text" [(ngModel)]="client.sector" name="sector" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">المدعي القانوني</label>
        <input type="text" [(ngModel)]="client.legalClaimant" name="legalClaimant" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">تاريخ الإخلاء / النهاية</label>
        <input type="date" [(ngModel)]="client.dateFinished" name="dateFinished" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">جهة العمل</label>
        <input type="text" [(ngModel)]="client.work" name="work" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">المهنة / المسمى</label>
        <input type="text" [(ngModel)]="client.membership" name="membership" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>
    </form>

    <!-- بيانات المبالغ (مثال) -->
    <form class="space-y-4">
      <h3 class="text-lg font-semibold mb-1" style="color: var(--text-color);">التفاصيل المالية</h3>

      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">القيمة (الدين)</label>
        <input type="number" [(ngModel)]="client.deptAmount" name="deptAmount" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">كود الدين</label>
        <input type="number" [(ngModel)]="client.deptCode" name="deptCode" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">رقم الباتش</label>
        <input type="text" [(ngModel)]="client.patchNo" name="patchNo" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="divider"></div>

      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">الشريك 1</label>
        <input type="text" [(ngModel)]="client.partner1" name="partner1" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">الشريك 2</label>
        <input type="text" [(ngModel)]="client.partner2" name="partner2" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>

      <div class="mb-1">
        <label class="text-sm" style="color: var(--text-color-secondary);">الشريك 3</label>
        <input type="text" [(ngModel)]="client.partner3" name="partner3" class="input input-bordered w-full"
          style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
      </div>
    </form>
  </div>


</div>
