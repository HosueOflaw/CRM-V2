<div class="rounded-2xl shadow-lg p-6 max-w-2xl mx-auto" style="background-color: var(--surface-card);">
  <h3 class="text-xl font-bold text-center mb-6" style="color: var(--text-color);">
    🏢 نموذج جهة العمل
  </h3>

  <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- اسم جهة العمل -->
    <div class="form-control md:col-span-2">
      <label class="label font-semibold" style="color: var(--text-color-secondary);">جهة العمل</label>
      <input type="text" [(ngModel)]="client.work" name="work" placeholder="أدخل اسم جهة العمل"
        class="input input-bordered w-full focus:ring-2 focus:ring-primary/50"
        style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
    </div>

    <!-- مسمى جهة العمل (Membership/Sector) -->
    <div class="form-control md:col-span-2">
      <label class="label font-semibold" style="color: var(--text-color-secondary);">المسمى الوظيفي / العضوية</label>
      <input type="text" [(ngModel)]="client.membership" name="membership" placeholder="أدخل المسمى الوظيفي"
        class="input input-bordered w-full focus:ring-2 focus:ring-primary/50"
        style="border-color: var(--surface-border); background-color: var(--surface-ground); color: var(--text-color);" />
    </div>
  </form>

  <!-- الأزرار -->
  <div class="flex justify-center gap-4 mt-8">
    <button type="button" class="btn btn-primary px-10 py-2 text-base rounded-xl" (click)="save()">
      💾 حفظ
    </button>
    <button type="button" class="btn btn-outline px-10 py-2 text-base rounded-xl" (click)="cancel()">
      ↩️ إلغاء
    </button>
  </div>
</div>
