<div class="page-container animate-slide-up">
  <app-go-back></app-go-back>

  <div class="page-header mt-8">
    <h2 class="flex items-center gap-4">
      <div class="header-icon-wrapper">
        <i class="fas fa-wallet text-2xl"></i>
      </div>
      <span>إدارة العهد والمصروفات</span>
    </h2>
  </div>

  <!-- Tabs Navigation -->
  <div class="tabs-nav">
    <div class="tab-link" [class.active]="activeTab === 'add'" (click)="setActiveTab('add')">
      <i class="fas fa-plus-circle"></i> إضافة كشف
    </div>
    <div class="tab-link" [class.active]="activeTab === 'report'" (click)="setActiveTab('report')">
      <i class="fas fa-file-invoice-dollar"></i> الاستعلام
    </div>
    <div class="tab-link" [class.active]="activeTab === 'stopped'" (click)="setActiveTab('stopped')">
      <i class="fas fa-pause-circle"></i> الموقوف
    </div>
  </div>

  <!-- Page Content -->
  <div class="page-content">
    <div class="flex flex-col lg:flex-row gap-10">

      <!-- Left side (File Preview) -->
      <div *ngIf="activeTab === 'add'" class="hidden lg:flex flex-col w-[35%]">
        <div class="preview-container sticky top-10">
          <div class="preview-header">
            <i class="fas fa-microscope text-blue-500"></i> معمل فحص المستندات
          </div>
          <div class="flex-1 overflow-hidden bg-[#fdfdfd] flex items-center justify-center p-6">
            <iframe *ngIf="previewUrl" [src]="previewUrl"
              class="w-full h-full rounded-2xl shadow-inner border border-gray-100" title="File Preview"></iframe>
            <div *ngIf="!previewUrl" class="preview-placeholder">
              <div class="icon-circle">
                <i class="fas fa-file-pdf"></i>
              </div>
              <h4 class="text-gray-900 font-bold mb-2">في انتظار المستند</h4>
              <p class="text-sm text-gray-400">يرجى اختيار ملف PDF لبدء المعاينة التفاعلية هنا</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Right side (Dynamic content) -->
      <div class="flex-1">
        <app-add-a-statement *ngIf="activeTab === 'add'" (filePreview)="onFilePreview($event)"></app-add-a-statement>
        <app-inquiry-about-rejected *ngIf="activeTab === 'stopped'"></app-inquiry-about-rejected>
        <app-inquiry-about-statement *ngIf="activeTab === 'report'"></app-inquiry-about-statement>
      </div>
    </div>
  </div>
</div>
